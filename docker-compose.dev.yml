name: vanpool-platform-dev

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: vanpool-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vanpool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanpool123}
      POSTGRES_DB: ${POSTGRES_DB:-vanpool_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vanpool} -d ${POSTGRES_DB:-vanpool_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vanpool-dev-network

  redis:
    image: redis:7-alpine
    container_name: vanpool-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - vanpool-dev-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vanpool-backend-dev
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-vanpool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanpool123}
      POSTGRES_DB: ${POSTGRES_DB:-vanpool_db}
      DATABASE_URL: ${DATABASE_URL:-postgresql://vanpool:vanpool123@postgres:5432/vanpool_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me-please-change}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-not-configured}
      GOOGLE_MAPS_BROWSER_API_KEY: ${GOOGLE_MAPS_BROWSER_API_KEY:-}
      GOOGLE_MAPS_MAP_ID: ${GOOGLE_MAPS_MAP_ID:-DEMO_MAP_ID}
      GOOGLE_MAPS_REGION: ${GOOGLE_MAPS_REGION:-IN}
      GOOGLE_MAPS_LANGUAGE: ${GOOGLE_MAPS_LANGUAGE:-en-US}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost}
      AUTO_RUN_MIGRATIONS: ${AUTO_RUN_MIGRATIONS:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vanpool-dev-network

  frontend:
    image: node:22-alpine
    container_name: vanpool-frontend-dev
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_BROWSER_API_KEY:-}
      VITE_GOOGLE_MAPS_MAP_ID: ${GOOGLE_MAPS_MAP_ID:-}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules_dev:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    networks:
      - vanpool-dev-network

volumes:
  postgres_data_dev:
  redis_data_dev:
  frontend_node_modules_dev:

networks:
  vanpool-dev-network:
    driver: bridge
