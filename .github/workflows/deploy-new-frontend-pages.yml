name: Deploy New Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "new frontend/**"
      - ".github/workflows/deploy-new-frontend-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: "new frontend/package-lock.json"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Compute base path
        run: echo "VITE_BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"

      - name: Install dependencies
        working-directory: "new frontend"
        run: npm ci

      - name: Build app
        working-directory: "new frontend"
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ vars.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_MAP_ID: ${{ vars.VITE_GOOGLE_MAPS_MAP_ID }}
        run: npm run build

      - name: Disable Jekyll processing
        run: touch "new frontend/dist/.nojekyll"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "new frontend/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
